<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1240" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#64748B"/>
    </marker>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#D97706"/>
    </marker>
    <style>
      text { fill: #1E293B; }
      .title  { font-size: 34px; font-weight: 700; fill: #0F172A; }
      .sub    { font-size: 16px; fill: #475569; }
      .grp    { font-size: 18px; font-weight: 600; fill: #334155; letter-spacing: 0.5px; text-transform: uppercase; }
      .bt     { font-size: 20px; font-weight: 700; }
      .bs     { font-size: 15px; fill: #475569; }
      .pl     { font-size: 17px; font-weight: 600; }
      .sm     { font-size: 14px; fill: #475569; }
      .tn     { font-size: 13px; fill: #64748B; }
      .edge   { fill: none; stroke: #94A3B8; stroke-width: 2; }
      .edgeS  { fill: none; stroke: #64748B; stroke-width: 2.4; }
      .edgeA  { fill: none; stroke: #D97706; stroke-width: 2; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect width="1560" height="1240" fill="#FAFBFC"/>

  <text x="780" y="40" class="title" text-anchor="middle">Smart Claims Processor - System Architecture</text>
  <text x="780" y="64" class="sub" text-anchor="middle">React  -  FastAPI  -  LangGraph + CrewAI  -  Agent Memory (ChromaDB)  -  Country Profiles  -  Pluggable LLM</text>

  <!-- ═══ ROW 1 - CLIENTS ═══ -->
  <text x="780" y="100" class="grp" text-anchor="middle">Clients</text>

  <rect x="330" y="114" width="260" height="72" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
  <text x="460" y="146" class="bt" text-anchor="middle" fill="#134E4A">Claimant</text>
  <text x="460" y="166" class="bs" text-anchor="middle">submits and tracks claims</text>

  <rect x="650" y="114" width="260" height="72" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
  <text x="780" y="146" class="bt" text-anchor="middle" fill="#134E4A">Reviewer</text>
  <text x="780" y="166" class="bs" text-anchor="middle">approves HITL tickets</text>

  <rect x="970" y="114" width="260" height="72" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
  <text x="1100" y="146" class="bt" text-anchor="middle" fill="#134E4A">Admin</text>
  <text x="1100" y="166" class="bs" text-anchor="middle">users, LLM, country</text>

  <line x1="460" y1="186" x2="460" y2="224" class="edgeS" marker-end="url(#arr)"/>
  <line x1="780" y1="186" x2="780" y2="224" class="edgeS" marker-end="url(#arr)"/>
  <line x1="1100" y1="186" x2="1100" y2="224" class="edgeS" marker-end="url(#arr)"/>

  <!-- ═══ ROW 2 - FRONTEND ═══ -->
  <rect x="60" y="224" width="1440" height="128" rx="16" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.8"/>
  <text x="90" y="254" class="bt" fill="#0C4A6E">React Frontend</text>
  <text x="90" y="274" class="bs">Vite  -  Zustand  -  Tailwind  -  Country-aware currency ($ / ₹)</text>

  <rect x="90" y="290" width="310" height="48" rx="10" fill="#CCFBF1" stroke="#0891B2" stroke-width="1"/>
  <text x="245" y="320" class="pl" text-anchor="middle" fill="#164E63">Claims UI</text>
  <rect x="420" y="290" width="310" height="48" rx="10" fill="#CCFBF1" stroke="#0891B2" stroke-width="1"/>
  <text x="575" y="320" class="pl" text-anchor="middle" fill="#164E63">HITL Review Queue</text>
  <rect x="750" y="290" width="310" height="48" rx="10" fill="#CCFBF1" stroke="#0891B2" stroke-width="1"/>
  <text x="905" y="320" class="pl" text-anchor="middle" fill="#164E63">Analytics Dashboard</text>
  <rect x="1080" y="290" width="340" height="48" rx="10" fill="#CCFBF1" stroke="#0891B2" stroke-width="1"/>
  <text x="1250" y="320" class="pl" text-anchor="middle" fill="#164E63">Settings / Country</text>

  <line x1="780" y1="352" x2="780" y2="400" class="edgeS" stroke-width="3" marker-end="url(#arr)"/>
  <text x="800" y="384" class="sm">HTTPS - JSON - Bearer</text>

  <!-- ═══ ROW 3 - BACKEND ═══ -->
  <rect x="60" y="400" width="1440" height="200" rx="16" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="90" y="430" class="bt" fill="#1E3A5F">FastAPI Backend</text>
  <text x="90" y="450" class="bs">JWT auth  -  BCrypt  -  CORS  -  SQLModel  -  Background threads</text>

  <rect x="100" y="468" width="350" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="275" y="498" class="pl" text-anchor="middle" fill="#1E3A5F">/api/auth</text>
  <rect x="480" y="468" width="350" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="655" y="498" class="pl" text-anchor="middle" fill="#1E3A5F">/api/claims</text>
  <rect x="860" y="468" width="560" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="1140" y="498" class="pl" text-anchor="middle" fill="#1E3A5F">/api/hitl  (interrupt / resume)</text>

  <rect x="100" y="530" width="350" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="275" y="560" class="pl" text-anchor="middle" fill="#1E3A5F">/api/appeals + analytics</text>
  <rect x="480" y="530" width="350" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="655" y="560" class="pl" text-anchor="middle" fill="#1E3A5F">/api/settings/llm</text>
  <rect x="860" y="530" width="560" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="1140" y="560" class="pl" text-anchor="middle" fill="#1E3A5F">/api/settings/country</text>

  <!-- Arrows: Backend -> Core Runtime (6 verticals to 6 box centers) -->
  <line x1="170" y1="600" x2="170" y2="670" class="edgeS" marker-end="url(#arr)"/>
  <line x1="414" y1="600" x2="414" y2="670" class="edgeS" marker-end="url(#arr)"/>
  <line x1="658" y1="600" x2="658" y2="670" class="edgeS" marker-end="url(#arr)"/>
  <line x1="902" y1="600" x2="902" y2="670" class="edgeS" marker-end="url(#arr)"/>
  <line x1="1146" y1="600" x2="1146" y2="670" class="edgeS" marker-end="url(#arr)"/>
  <line x1="1390" y1="600" x2="1390" y2="670" class="edgeS" marker-end="url(#arr)"/>

  <!-- ═══ ROW 4 - CORE RUNTIME (6 boxes, 220px each, 24px gaps) ═══ -->

  <!-- 1. LangGraph Engine -->
  <rect x="60" y="670" width="220" height="176" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="170" y="698" class="bt" text-anchor="middle" fill="#1E3A5F">LangGraph Engine</text>
  <text x="170" y="716" class="bs" text-anchor="middle">StateGraph - edges</text>
  <text x="170" y="734" class="bs" text-anchor="middle">interrupt() - resume</text>
  <rect x="80" y="752" width="180" height="42" rx="8" fill="#FAF5FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="170" y="772" class="pl" text-anchor="middle" fill="#4C1D95">CrewAI sub-crew</text>
  <text x="170" y="790" class="sm" text-anchor="middle">pattern - anomaly - social</text>

  <!-- 2. SqliteSaver -->
  <rect x="304" y="670" width="220" height="176" rx="14" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="414" y="698" class="bt" text-anchor="middle" fill="#78350F">SqliteSaver</text>
  <text x="414" y="716" class="bs" text-anchor="middle">LangGraph checkpointer</text>
  <text x="414" y="752" class="sm" text-anchor="middle">thread_id = claim_id</text>
  <text x="414" y="770" class="sm" text-anchor="middle">claims_checkpoints.db</text>
  <text x="414" y="800" class="tn" text-anchor="middle">durable across restarts</text>

  <!-- 3. Country Config -->
  <rect x="548" y="670" width="220" height="176" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.8"/>
  <text x="658" y="698" class="bt" text-anchor="middle" fill="#14532D">Country Config</text>
  <text x="658" y="716" class="bs" text-anchor="middle">countries/{code}.yaml</text>
  <text x="658" y="750" class="sm" text-anchor="middle">PII (SSN vs Aadhaar)</text>
  <text x="658" y="768" class="sm" text-anchor="middle">Depreciation method</text>
  <text x="658" y="786" class="sm" text-anchor="middle">Settlement - HITL rules</text>
  <rect x="580" y="816" width="56" height="18" rx="4" fill="#DCFCE7" stroke="#16A34A" stroke-width="0.8"/>
  <text x="608" y="829" class="tn" text-anchor="middle" fill="#16A34A">US</text>
  <rect x="644" y="816" width="56" height="18" rx="4" fill="#DCFCE7" stroke="#16A34A" stroke-width="0.8"/>
  <text x="672" y="829" class="tn" text-anchor="middle" fill="#16A34A">India</text>

  <!-- 4. Agent Memory (NEW) -->
  <rect x="792" y="670" width="220" height="176" rx="14" fill="#E0F2FE" stroke="#0891B2" stroke-width="1.8"/>
  <text x="902" y="698" class="bt" text-anchor="middle" fill="#164E63">Agent Memory</text>
  <text x="902" y="716" class="bs" text-anchor="middle">ChromaDB + HuggingFace</text>
  <text x="902" y="750" class="sm" text-anchor="middle">Short-term (state dict)</text>
  <text x="902" y="768" class="sm" text-anchor="middle">Long-term (past claims)</text>
  <text x="902" y="786" class="sm" text-anchor="middle">Episodic (overrides, fraud)</text>
  <text x="902" y="810" class="tn" text-anchor="middle">all-MiniLM-L6-v2 embeddings</text>
  <text x="902" y="828" class="tn" text-anchor="middle">@tool search_similar_claims</text>

  <!-- 5. LLM Factory -->
  <rect x="1036" y="670" width="220" height="176" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.8"/>
  <text x="1146" y="698" class="bt" text-anchor="middle" fill="#0C4A6E">LLM Factory</text>
  <text x="1146" y="716" class="bs" text-anchor="middle">src/llm.py</text>
  <text x="1146" y="752" class="sm" text-anchor="middle">provider: gemini | groq</text>
  <text x="1146" y="770" class="sm" text-anchor="middle">runtime switch via API</text>
  <text x="1146" y="800" class="tn" text-anchor="middle">primary -> fallback on error</text>

  <!-- 6. SQLite Store -->
  <rect x="1280" y="670" width="220" height="176" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.8"/>
  <text x="1390" y="698" class="bt" text-anchor="middle" fill="#064E3B">SQLite Store</text>
  <text x="1390" y="716" class="bs" text-anchor="middle">SQLModel tables</text>
  <text x="1390" y="752" class="sm" text-anchor="middle">Users - Claims - Appeals</text>
  <text x="1390" y="770" class="sm" text-anchor="middle">HITL queue (tickets)</text>
  <text x="1390" y="800" class="tn" text-anchor="middle">audit logs - 7-yr retention</text>

  <!-- LangGraph <-> Checkpointer -->
  <line x1="280" y1="758" x2="304" y2="758" class="edgeA" marker-end="url(#arrA)" marker-start="url(#arrA)"/>
  <text x="292" y="746" class="tn" text-anchor="middle" fill="#B45309">save</text>

  <!-- LangGraph -> Pipeline -->
  <line x1="170" y1="846" x2="170" y2="896" class="edgeS" marker-end="url(#arr)"/>
  <text x="190" y="878" class="sm">hosts agents</text>

  <!-- ═══ ROW 5 - PIPELINE AGENTS ═══ -->
  <text x="780" y="892" class="grp" text-anchor="middle" opacity="0.85">LangGraph Agents (sequential, with conditional branches)</text>

  <rect x="26" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="110" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Intake</text>
  <text x="110" y="952" class="sm" text-anchor="middle">validate + mask PII</text>
  <line x1="194" y1="939" x2="216" y2="939" class="edge" marker-end="url(#arrL)"/>

  <rect x="216" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="300" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Fraud Crew</text>
  <text x="300" y="952" class="sm" text-anchor="middle">CrewAI - 3 roles</text>
  <line x1="384" y1="939" x2="406" y2="939" class="edge" marker-end="url(#arrL)"/>

  <rect x="406" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="490" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Damage</text>
  <text x="490" y="952" class="sm" text-anchor="middle">assess severity</text>
  <line x1="574" y1="939" x2="596" y2="939" class="edge" marker-end="url(#arrL)"/>

  <rect x="596" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="680" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Policy</text>
  <text x="680" y="952" class="sm" text-anchor="middle">coverage check</text>
  <line x1="764" y1="939" x2="786" y2="939" class="edge" marker-end="url(#arrL)"/>

  <rect x="786" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="870" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Settlement</text>
  <text x="870" y="952" class="sm" text-anchor="middle">compute payout</text>
  <line x1="954" y1="939" x2="976" y2="939" class="edge" marker-end="url(#arrL)"/>

  <rect x="976" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="1060" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Evaluator</text>
  <text x="1060" y="952" class="sm" text-anchor="middle">LLM-as-judge</text>
  <line x1="1144" y1="939" x2="1166" y2="939" class="edge" marker-end="url(#arrL)"/>

  <rect x="1166" y="908" width="168" height="62" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/>
  <text x="1250" y="934" class="pl" text-anchor="middle" fill="#1E3A5F">Communication</text>
  <text x="1250" y="952" class="sm" text-anchor="middle">notify claimant</text>

  <!-- LLM Factory -> Providers -->
  <line x1="1096" y1="846" x2="1040" y2="1020" class="edgeS" marker-end="url(#arr)"/>
  <line x1="1196" y1="846" x2="1260" y2="1020" class="edgeS" marker-end="url(#arr)"/>

  <!-- ═══ ROW 6 - LLM PROVIDERS ═══ -->
  <rect x="940" y="1020" width="200" height="72" rx="12" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
  <text x="1040" y="1050" class="bt" text-anchor="middle" fill="#78350F">Gemini</text>
  <text x="1040" y="1070" class="sm" text-anchor="middle">2.5-flash / 2.5-flash-lite</text>

  <rect x="1160" y="1020" width="200" height="72" rx="12" fill="#FCE7F3" stroke="#BE185D" stroke-width="1.6"/>
  <text x="1260" y="1050" class="bt" text-anchor="middle" fill="#831843">Groq</text>
  <text x="1260" y="1070" class="sm" text-anchor="middle">llama-3.3-70b / 3.1-8b</text>

  <!-- Footer -->
  <text x="780" y="1148" class="sm" text-anchor="middle">Guardrails (cost / tokens / agent-call caps)  -  PII masking (country-aware)  -  Audit log 7 yr  -  Tool calls (@tool decorator)</text>
  <text x="780" y="1172" class="tn" text-anchor="middle">Pipeline stores every outcome to long-term memory. Agents recall similar claims + fraud episodes via semantic search. System learns from its own decisions.</text>
</svg>
