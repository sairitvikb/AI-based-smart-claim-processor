<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="aE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#15803D"/>
    </marker>
    <marker id="aS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#0284C7"/>
    </marker>
    <marker id="aR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#DC2626"/>
    </marker>
    <marker id="aD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#DC2626"/>
    </marker>
    <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#B45309"/>
    </marker>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L8,5 L0,9 z" fill="#7E22CE"/>
    </marker>
    <style>
      text { fill: #1E293B; }
      .title  { font-size: 34px; font-weight: 700; }
      .sub    { font-size: 16px; fill: #475569; }
      .ch     { font-size: 16px; font-weight: 600; fill: #475569; text-transform: uppercase; }
      .chH    { font-size: 16px; font-weight: 700; fill: #B45309; text-transform: uppercase; }
      .rl     { font-size: 20px; font-weight: 700; }
      .rs     { font-size: 14px; fill: #475569; }
      .bl     { font-size: 16px; font-weight: 600; }
      .el     { font-size: 14px; fill: #475569; font-weight: 500; }
      .ct     { font-size: 19px; font-weight: 700; fill: #B45309; }
      .cb     { font-size: 16px; fill: #334155; }
      .cm     { font-size: 15px; fill: #B45309; font-family: 'JetBrains Mono', Consolas, monospace; }

      .eN { fill:none; stroke:#16A34A; stroke-width:2; }
      .eF { fill:none; stroke:#0EA5E9; stroke-width:2; }
      .eI { fill:none; stroke:#EF4444; stroke-width:2; stroke-dasharray:5 3; }
      .eR { fill:none; stroke:#EF4444; stroke-width:2; stroke-dasharray:5 3; }
      .eH { fill:none; stroke:#D97706; stroke-width:2.4; }
      .eG { fill:none; stroke:#9333EA; stroke-width:2; stroke-dasharray:8 4; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="#FAFBFC"/>

  <text x="800" y="42" class="title" text-anchor="middle">Pipeline Execution Paths</text>
  <text x="800" y="66" class="sub" text-anchor="middle">Five conditional routes + per-agent confidence gates - country-agnostic pipeline, config-driven rules</text>

  <text x="260" y="108" class="ch" text-anchor="middle">START</text>
  <text x="390" y="108" class="ch" text-anchor="middle">Intake</text>
  <text x="520" y="108" class="ch" text-anchor="middle">Fraud</text>
  <text x="650" y="108" class="ch" text-anchor="middle">Damage</text>
  <text x="780" y="108" class="ch" text-anchor="middle">Policy</text>
  <text x="910" y="108" class="ch" text-anchor="middle">Settle</text>
  <text x="1040" y="108" class="ch" text-anchor="middle">Eval</text>
  <text x="1170" y="108" class="chH" text-anchor="middle">HITL</text>
  <text x="1300" y="108" class="ch" text-anchor="middle">Comm</text>
  <text x="1430" y="108" class="ch" text-anchor="middle">END</text>
  <line x1="150" y1="122" x2="1500" y2="122" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ROW 1 - NORMAL (Path A) -->
  <text x="20" y="178" class="rl">A Normal</text>
  <text x="20" y="198" class="rs">happy path - 7 agents</text>

  <rect x="205" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="260" y="185" class="bl" text-anchor="middle" fill="#15803D">START</text>
  <rect x="335" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="390" y="185" class="bl" text-anchor="middle" fill="#15803D">Intake</text>
  <rect x="465" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="520" y="185" class="bl" text-anchor="middle" fill="#15803D">Fraud Crew</text>
  <rect x="595" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="650" y="185" class="bl" text-anchor="middle" fill="#15803D">Damage</text>
  <rect x="725" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="780" y="185" class="bl" text-anchor="middle" fill="#15803D">Policy</text>
  <rect x="855" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="910" y="185" class="bl" text-anchor="middle" fill="#15803D">Settlement</text>
  <rect x="985" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="1040" y="185" class="bl" text-anchor="middle" fill="#15803D">Evaluator</text>
  <rect x="1245" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="1300" y="185" class="bl" text-anchor="middle" fill="#15803D">Comm</text>
  <rect x="1375" y="152" width="110" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="1430" y="185" class="bl" text-anchor="middle" fill="#15803D">END</text>

  <line x1="315" y1="180" x2="335" y2="180" class="eN" marker-end="url(#aE)"/>
  <line x1="445" y1="180" x2="465" y2="180" class="eN" marker-end="url(#aE)"/>
  <line x1="575" y1="180" x2="595" y2="180" class="eN" marker-end="url(#aE)"/>
  <line x1="705" y1="180" x2="725" y2="180" class="eN" marker-end="url(#aE)"/>
  <line x1="835" y1="180" x2="855" y2="180" class="eN" marker-end="url(#aE)"/>
  <line x1="965" y1="180" x2="985" y2="180" class="eN" marker-end="url(#aE)"/>
  <line x1="1095" y1="180" x2="1245" y2="180" class="eN" marker-end="url(#aE)"/>
  <text x="1170" y="170" class="el" text-anchor="middle">eval passed</text>
  <line x1="1355" y1="180" x2="1375" y2="180" class="eN" marker-end="url(#aE)"/>

  <!-- ROW 2 - FAST MODE (Path E) -->
  <text x="20" y="298" class="rl">E Fast</text>
  <text x="20" y="318" class="rs">amount &lt; $500</text>

  <rect x="205" y="272" width="110" height="56" rx="10" fill="#EFF6FF" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="260" y="305" class="bl" text-anchor="middle" fill="#0369A1">START</text>
  <rect x="335" y="272" width="110" height="56" rx="10" fill="#EFF6FF" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="390" y="305" class="bl" text-anchor="middle" fill="#0369A1">Intake</text>
  <rect x="855" y="272" width="110" height="56" rx="10" fill="#EFF6FF" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="910" y="305" class="bl" text-anchor="middle" fill="#0369A1">Settlement</text>
  <rect x="1245" y="272" width="110" height="56" rx="10" fill="#EFF6FF" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="1300" y="305" class="bl" text-anchor="middle" fill="#0369A1">Comm</text>
  <rect x="1375" y="272" width="110" height="56" rx="10" fill="#EFF6FF" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="1430" y="305" class="bl" text-anchor="middle" fill="#0369A1">END</text>

  <line x1="315" y1="300" x2="335" y2="300" class="eF" marker-end="url(#aS)"/>
  <line x1="445" y1="300" x2="855" y2="300" class="eF" marker-end="url(#aS)"/>
  <text x="650" y="290" class="el" text-anchor="middle">fast_mode - skip fraud/damage/policy</text>
  <line x1="965" y1="300" x2="1245" y2="300" class="eF" marker-end="url(#aS)"/>
  <line x1="1355" y1="300" x2="1375" y2="300" class="eF" marker-end="url(#aS)"/>

  <!-- ROW 3 - INVALID (Path D) -->
  <text x="20" y="418" class="rl">D Invalid</text>
  <text x="20" y="438" class="rs">intake failed - deny</text>

  <rect x="205" y="392" width="110" height="56" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="260" y="425" class="bl" text-anchor="middle" fill="#B91C1C">START</text>
  <rect x="335" y="392" width="110" height="56" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="390" y="425" class="bl" text-anchor="middle" fill="#B91C1C">Intake</text>
  <rect x="1245" y="392" width="110" height="56" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="1300" y="425" class="bl" text-anchor="middle" fill="#B91C1C">Comm</text>
  <rect x="1375" y="392" width="110" height="56" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="1430" y="425" class="bl" text-anchor="middle" fill="#B91C1C">END</text>

  <line x1="315" y1="420" x2="335" y2="420" class="eI" marker-end="url(#aR)"/>
  <line x1="445" y1="420" x2="1245" y2="420" class="eI" marker-end="url(#aR)"/>
  <text x="845" y="410" class="el" text-anchor="middle">invalid intake - denial with specific reasons</text>
  <line x1="1355" y1="420" x2="1375" y2="420" class="eI" marker-end="url(#aR)"/>

  <!-- ROW 4 - AUTO-REJECT (Path C) -->
  <text x="20" y="538" class="rl">C Reject</text>
  <text x="20" y="558" class="rs">confirmed fraud</text>

  <rect x="205" y="512" width="110" height="56" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="260" y="545" class="bl" text-anchor="middle" fill="#991B1B">START</text>
  <rect x="335" y="512" width="110" height="56" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="390" y="545" class="bl" text-anchor="middle" fill="#991B1B">Intake</text>
  <rect x="465" y="512" width="110" height="56" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="520" y="545" class="bl" text-anchor="middle" fill="#991B1B">Fraud Crew</text>
  <rect x="1245" y="512" width="110" height="56" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="1300" y="545" class="bl" text-anchor="middle" fill="#991B1B">Comm</text>
  <rect x="1375" y="512" width="110" height="56" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="1430" y="545" class="bl" text-anchor="middle" fill="#991B1B">END</text>

  <line x1="315" y1="540" x2="335" y2="540" class="eR" marker-end="url(#aD)"/>
  <line x1="445" y1="540" x2="465" y2="540" class="eR" marker-end="url(#aD)"/>
  <line x1="575" y1="540" x2="1245" y2="540" class="eR" marker-end="url(#aD)"/>
  <text x="910" y="530" class="el" text-anchor="middle">fraud_score >= 0.90 + CONFIRMED - auto_reject</text>
  <line x1="1355" y1="540" x2="1375" y2="540" class="eR" marker-end="url(#aD)"/>

  <!-- ROW 5 - HITL (Path B) - fraud/eval triggered -->
  <text x="20" y="658" class="rl" fill="#B45309">B HITL</text>
  <text x="20" y="678" class="rs">fraud >= 0.65 or eval fail</text>

  <rect x="205" y="632" width="110" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="260" y="665" class="bl" text-anchor="middle" fill="#92400E">START</text>
  <rect x="335" y="632" width="110" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="390" y="665" class="bl" text-anchor="middle" fill="#92400E">Intake</text>
  <rect x="465" y="632" width="110" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="520" y="665" class="bl" text-anchor="middle" fill="#92400E">Fraud Crew</text>

  <rect x="670" y="628" width="120" height="64" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="730" y="656" font-size="19" font-weight="700" text-anchor="middle" fill="#92400E">PAUSE</text>
  <text x="730" y="678" font-size="15" text-anchor="middle" fill="#92400E">interrupt()</text>

  <rect x="1245" y="632" width="110" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="1300" y="665" class="bl" text-anchor="middle" fill="#92400E">Comm</text>
  <rect x="1375" y="632" width="110" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="1430" y="665" class="bl" text-anchor="middle" fill="#92400E">END</text>

  <line x1="315" y1="660" x2="335" y2="660" class="eH" marker-end="url(#aA)"/>
  <line x1="445" y1="660" x2="465" y2="660" class="eH" marker-end="url(#aA)"/>
  <line x1="575" y1="660" x2="670" y2="660" class="eH" marker-end="url(#aA)"/>
  <line x1="790" y1="660" x2="1245" y2="660" class="eH" marker-end="url(#aA)"/>
  <text x="1020" y="650" class="el" text-anchor="middle" fill="#B45309">resume(decision)</text>
  <line x1="1355" y1="660" x2="1375" y2="660" class="eH" marker-end="url(#aA)"/>

  <!-- ROW 6 - CONFIDENCE GATES (new) -->
  <text x="20" y="778" class="rl" fill="#7E22CE">Confidence</text>
  <text x="20" y="798" class="rs">any agent &lt; threshold</text>

  <rect x="205" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="260" y="785" class="bl" text-anchor="middle" fill="#7E22CE">START</text>
  <rect x="335" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="390" y="785" class="bl" text-anchor="middle" fill="#7E22CE">Intake</text>
  <rect x="465" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="520" y="785" class="bl" text-anchor="middle" fill="#7E22CE">Fraud Crew</text>
  <rect x="595" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="650" y="785" class="bl" text-anchor="middle" fill="#7E22CE">Damage</text>
  <rect x="725" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="780" y="785" class="bl" text-anchor="middle" fill="#7E22CE">Policy</text>
  <rect x="855" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="910" y="785" class="bl" text-anchor="middle" fill="#7E22CE">Settlement</text>

  <rect x="1010" y="748" width="120" height="64" rx="12" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"/>
  <text x="1070" y="776" font-size="18" font-weight="700" text-anchor="middle" fill="#7E22CE">PAUSE</text>
  <text x="1070" y="798" font-size="14" text-anchor="middle" fill="#7E22CE">conf &lt; threshold</text>

  <rect x="1245" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="1300" y="785" class="bl" text-anchor="middle" fill="#7E22CE">Comm</text>
  <rect x="1375" y="752" width="110" height="56" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="1430" y="785" class="bl" text-anchor="middle" fill="#7E22CE">END</text>

  <line x1="315" y1="780" x2="335" y2="780" class="eG" marker-end="url(#aG)"/>
  <line x1="445" y1="780" x2="465" y2="780" class="eG" marker-end="url(#aG)"/>
  <line x1="575" y1="780" x2="595" y2="780" class="eG" marker-end="url(#aG)"/>
  <line x1="705" y1="780" x2="725" y2="780" class="eG" marker-end="url(#aG)"/>
  <line x1="835" y1="780" x2="855" y2="780" class="eG" marker-end="url(#aG)"/>
  <line x1="965" y1="780" x2="1010" y2="780" class="eG" marker-end="url(#aG)"/>
  <line x1="1130" y1="780" x2="1245" y2="780" class="eG" marker-end="url(#aG)"/>
  <text x="1190" y="740" class="el" text-anchor="middle" fill="#7E22CE">resume -> next agent</text>
  <line x1="1355" y1="780" x2="1375" y2="780" class="eG" marker-end="url(#aG)"/>

  <text x="800" y="836" class="el" text-anchor="middle" fill="#7E22CE">gates after every agent: intake(0.55)  fraud(0.50)  damage(0.60)  policy(0.60)  settlement(0.65)</text>

  <!-- CALLOUT -->
  <rect x="80" y="860" width="1440" height="190" rx="14" fill="#F8FAFC" stroke="#D97706" stroke-width="1.6"/>
  <text x="108" y="892" class="ct" fill="#0F172A">Agent Transparency + Confidence-Based HITL</text>

  <text x="108" y="920" class="cb">
    <tspan>Every agent produces: </tspan>
    <tspan class="cm" fill="#B45309">confidence</tspan>
    <tspan> (0-1), </tspan>
    <tspan class="cm" fill="#B45309">decision</tspan>
    <tspan>, </tspan>
    <tspan class="cm" fill="#B45309">reasoning</tspan>
    <tspan>, </tspan>
    <tspan class="cm" fill="#B45309">flags</tspan>
    <tspan>, and </tspan>
    <tspan class="cm" fill="#B45309">findings</tspan>
    <tspan> - all persisted and visible in the Agent Trace panel.</tspan>
  </text>
  <text x="108" y="948" class="cb">
    <tspan>If any agent's confidence falls below its configured threshold, the pipeline pauses at a dedicated HITL node.</tspan>
  </text>
  <text x="108" y="976" class="cb">
    <tspan>Each HITL gate resumes to the correct next agent: </tspan>
    <tspan class="cm" fill="#7E22CE">hitl_after_damage -> policy_checker</tspan>
    <tspan>, </tspan>
    <tspan class="cm" fill="#7E22CE">hitl_after_policy -> settlement</tspan>
    <tspan>, etc.</tspan>
  </text>
  <text x="108" y="1004" class="cb">
    <tspan>HITL triggers: fraud >= 0.65, eval quality gate failed, agent confidence below threshold, amount >= $10K / Rs5L</tspan>
  </text>
  <text x="108" y="1032" class="cb">
    <tspan>Pipeline checkpointed by </tspan>
    <tspan class="cm" fill="#B45309">SqliteSaver</tspan>
    <tspan> - durable across server restarts. Reviewer resumes via </tspan>
    <tspan class="cm" fill="#B45309">Command(resume=decision)</tspan>
    <tspan>.</tspan>
  </text>

  <text x="800" y="1080" class="sub" text-anchor="middle">LangGraph 1.x  -  SqliteSaver  -  CrewAI Fraud Crew  -  Agent Memory (ChromaDB)  -  Country Profiles (US / India)  -  Pluggable LLM  -  Token/Cost Tracking</text>
</svg>
