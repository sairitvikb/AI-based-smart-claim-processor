###############################################################
# Country Profile: India
# Based on IRDAI Motor Vehicle Insurance guidelines
###############################################################

country:
  code: IN
  name: India
  currency: INR
  currency_symbol: "₹"
  regulator: IRDAI (Insurance Regulatory and Development Authority of India)
  timezone: Asia/Kolkata

# PII fields to mask before LLM calls
pii:
  fields:
    - name
    - email
    - phone
    - aadhaar               # 12-digit unique identity
    - pan                   # Permanent Account Number (tax ID)
    - dob
    - address
    - bank_account
    - driving_licence
    - rc_number             # Vehicle Registration Certificate
  patterns:
    aadhaar: '\b\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'
    pan: '\b[A-Z]{5}\d{4}[A-Z]\b'
    phone: '\b(?:\+91[-.\s]?)?[6-9]\d{9}\b'
    email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'
    pincode: '\b[1-9]\d{5}\b'
    credit_card: '\b(?:\d[ -]*?){13,19}\b'
    dob: '\b(?:0[1-9]|[12]\d|3[01])/(?:0[1-9]|1[0-2])/(?:19|20)\d{2}\b'
  redact_fields:
    - claimant_dob
    - aadhaar
    - pan
    - bank_account
    - driving_licence

# Claim types per IRDAI motor/non-motor categories
claim_types:
  - own_damage              # comprehensive policy, own vehicle damage
  - third_party_injury      # mandatory third-party liability (injury)
  - third_party_property    # mandatory third-party liability (property)
  - theft                   # vehicle theft under comprehensive
  - natural_calamity        # flood, earthquake, cyclone, etc.
  - personal_accident       # PA cover (mandatory for owner-driver)
  - fire                    # vehicle fire under comprehensive

# Policy / coverage mapping
coverage_mapping:
  own_damage: comprehensive
  third_party_injury: third_party
  third_party_property: third_party
  theft: comprehensive
  natural_calamity: comprehensive
  personal_accident: pa_cover
  fire: comprehensive

# IRDAI-mandated part-wise depreciation (not year-based like US)
# Applied to individual part categories, not the whole vehicle age
depreciation:
  method: part_wise
  parts:
    rubber_nylon_plastic: 0.50     # tyres, tubes, nylon parts - 50%
    batteries: 0.50                # 50%
    air_bags: 0.50                 # 50%
    fiberglass_components: 0.30    # 30%
    glass: 0.00                    # no depreciation on windshield/glass
    metal_body: 0.05               # 5% on metal shell
    paint: 0.50                    # 50% on painting/refinishing
    mechanical_parts: 0.00         # engine, gearbox - no depreciation if < 5 yrs
    electrical_parts: 0.15         # 15%
  # Additional age-based depreciation on vehicle IDV
  vehicle_age_idv:
    "0-6_months": 0.05
    "6-12_months": 0.15
    "1-2_years": 0.20
    "2-3_years": 0.30
    "3-4_years": 0.40
    "4-5_years": 0.50

# Settlement rules per IRDAI
settlement:
  basis: idv                        # Insured Declared Value (not assessed damage)
  max_payout_multiplier: 1.0        # can never exceed IDV
  gst_rate: 0.18                    # 18% GST on insurance premium
  tax_on_payout: 0.0                # no tax on claim payout itself
  total_loss_threshold: 0.75        # repair > 75% of IDV = total loss
  no_claim_bonus:                   # NCB discount on next premium
    year_1: 0.20
    year_2: 0.25
    year_3: 0.35
    year_4: 0.45
    year_5_plus: 0.50

# HITL thresholds (INR values)
hitl:
  triggers:
    min_amount: 500000             # ₹5,00,000 (₹5 lakh)
    first_claim_high_value: 200000 # ₹2,00,000 (₹2 lakh)

# Fraud baselines for Indian market (INR)
fraud_baselines:
  own_damage: { avg_amount: 85000, std_dev: 60000, max_normal: 500000 }
  third_party_injury: { avg_amount: 250000, std_dev: 200000, max_normal: 1500000 }
  third_party_property: { avg_amount: 50000, std_dev: 35000, max_normal: 200000 }
  theft: { avg_amount: 600000, std_dev: 350000, max_normal: 2500000 }
  natural_calamity: { avg_amount: 150000, std_dev: 100000, max_normal: 800000 }
  personal_accident: { avg_amount: 500000, std_dev: 300000, max_normal: 2000000 }
  fire: { avg_amount: 200000, std_dev: 150000, max_normal: 1000000 }

# Communication
communication:
  languages: [en, hi]
  contact_phone: "1800-258-5678"
  contact_email: "claims@smartinsurance.in"
  regulatory_footer: >
    This decision is in accordance with IRDAI (Protection of
    Policyholders' Interests) Regulations. If you are dissatisfied,
    you may approach the Insurance Ombudsman under Rule 13 of the
    Insurance Ombudsman Rules, 2017, within 1 year of the insurer's
    decision. Alternatively, file a complaint on IGMS (igms.irda.gov.in).
  appeal_window_text: "You may file an appeal within 30 days or approach the Insurance Ombudsman within 1 year."

# Required documents per claim type (Indian context)
required_documents:
  own_damage: [photos, repair_estimate_authorized_garage, driving_licence, rc_book]
  third_party_injury: [fir_copy, medical_reports, rc_book, driving_licence, witness_statements]
  third_party_property: [fir_copy, photos, third_party_repair_estimate, rc_book]
  theft: [fir_copy, rc_book, all_key_sets, non_traceable_certificate, driving_licence]
  natural_calamity: [photos, weather_report, repair_estimate, rc_book]
  personal_accident: [fir_copy, medical_reports, disability_certificate, nominee_id]
  fire: [fire_brigade_report, fir_copy, photos, rc_book]
